<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A86D8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#003A70;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#001A3A" flood-opacity="0.4"/>
    </filter>
  </defs>

  <rect width="200" height="200" rx="38" ry="38" fill="url(#bgGrad)"/>

  <g opacity="0.08" stroke="white" stroke-width="0.8">
    <line x1="0" y1="50" x2="200" y2="50"/>
    <line x1="0" y1="100" x2="200" y2="100"/>
    <line x1="0" y1="150" x2="200" y2="150"/>
    <line x1="50" y1="0" x2="50" y2="200"/>
    <line x1="100" y1="0" x2="100" y2="200"/>
    <line x1="150" y1="0" x2="150" y2="200"/>
  </g>

  <!-- Badge polygon top -->
  <g transform="translate(100,32)" filter="url(#shadow)">
    <polygon points="0,-14 14,-5 10,12 0,7 -10,12 -14,-5" fill="#E74C3C" stroke="#C0392B" stroke-width="0.8"/>
    <text x="0" y="3" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="9" fill="white">L</text>
  </g>

  <!-- Beacon / radar glyph inside circle -->
  <g filter="url(#shadow)">
    <circle cx="100" cy="100" r="46" fill="white"/>
    <circle cx="100" cy="100" r="38" fill="url(#bgGrad)"/>

    <!-- Concentric arc rings (radar sweep) -->
    <circle cx="100" cy="112" r="10" fill="none" stroke="#E74C3C" stroke-width="1.6" opacity="0.70"/>
    <circle cx="100" cy="112" r="20" fill="none" stroke="#E74C3C" stroke-width="1.2" opacity="0.55"/>
    <circle cx="100" cy="112" r="30" fill="none" stroke="#E74C3C" stroke-width="0.9" opacity="0.35"/>

    <!-- Beacon tower -->
    <line x1="100" y1="112" x2="100" y2="80" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.90"/>
    <!-- Tower cap -->
    <circle cx="100" cy="79" r="3" fill="#E74C3C"/>
    <!-- Sweep ray -->
    <line x1="100" y1="112" x2="126" y2="85" stroke="white" stroke-width="1.5" opacity="0.65" stroke-dasharray="3,2"/>
    <!-- Blip dot on sweep ray -->
    <circle cx="118" cy="92" r="2.5" fill="white" opacity="0.85"/>

    <!-- Horizon baseline -->
    <line x1="72" y1="112" x2="128" y2="112" stroke="white" stroke-width="1.2" opacity="0.30"/>

    <circle cx="100" cy="100" r="38" fill="none" stroke="white" stroke-width="1.5" opacity="0.2"/>
  </g>

  <text x="100" y="168" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-weight="bold" font-size="13" fill="white" letter-spacing="1" opacity="0.95">AZURE LOCAL</text>
  <text x="100" y="186" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-weight="bold" font-size="13" fill="#E74C3C" letter-spacing="1.5" opacity="0.95">BEACON</text>
</svg>
