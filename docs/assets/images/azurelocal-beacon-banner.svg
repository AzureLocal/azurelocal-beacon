<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 160" width="640" height="160">
  <defs>
    <linearGradient id="bannerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   style="stop-color:#003A70;stop-opacity:1" />
      <stop offset="60%"  style="stop-color:#0078D4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A86D8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   style="stop-color:#1A86D8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#003A70;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#001A3A" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="640" height="160" rx="12" ry="12" fill="url(#bannerGrad)"/>

  <!-- Subtle grid -->
  <g opacity="0.06" stroke="white" stroke-width="0.8">
    <line x1="0" y1="40"  x2="640" y2="40"/>
    <line x1="0" y1="80"  x2="640" y2="80"/>
    <line x1="0" y1="120" x2="640" y2="120"/>
    <line x1="160" y1="0" x2="160" y2="160"/>
    <line x1="320" y1="0" x2="320" y2="160"/>
    <line x1="480" y1="0" x2="480" y2="160"/>
  </g>

  <!-- Icon square (left) -->
  <rect x="16" y="16" width="128" height="128" rx="20" ry="20" fill="url(#iconGrad)" filter="url(#shadow)"/>

  <!-- Badge polygon -->
  <g transform="translate(80,36)">
    <polygon points="0,-12 12,-4 8,10 0,6 -8,10 -12,-4" fill="#E74C3C" stroke="#C0392B" stroke-width="0.8"/>
    <text x="0" y="2.5" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="7.5" fill="white">L</text>
  </g>

  <!-- Beacon radar glyph -->
  <g>
    <circle cx="80" cy="98" r="8"  fill="none" stroke="#E74C3C" stroke-width="1.6" opacity="0.75"/>
    <circle cx="80" cy="98" r="17" fill="none" stroke="#E74C3C" stroke-width="1.2" opacity="0.55"/>
    <circle cx="80" cy="98" r="26" fill="none" stroke="#E74C3C" stroke-width="0.9" opacity="0.35"/>
    <line x1="80" y1="98" x2="80" y2="70" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.90"/>
    <circle cx="80" cy="69" r="2.5" fill="#E74C3C"/>
    <line x1="80" y1="98" x2="103" y2="74" stroke="white" stroke-width="1.4" opacity="0.65" stroke-dasharray="3,2"/>
    <circle cx="96" cy="80" r="2.2" fill="white" opacity="0.85"/>
    <line x1="56" y1="98" x2="104" y2="98" stroke="white" stroke-width="1" opacity="0.30"/>
  </g>

  <!-- Icon white ring -->
  <circle cx="80" cy="90" r="38" fill="none" stroke="white" stroke-width="1" opacity="0.15"/>

  <!-- Product text (right of icon) -->
  <text x="164" y="60" font-family="'Segoe UI', Arial, sans-serif" font-weight="700" font-size="36" fill="white" letter-spacing="1" opacity="0.98">AzL Beacon</text>
  <text x="165" y="92" font-family="'Segoe UI', Arial, sans-serif" font-weight="400" font-size="16" fill="white" letter-spacing="0.5" opacity="0.88">Azure Local Pre-Deployment Validation</text>

  <!-- Tagline -->
  <text x="165" y="134" font-family="'Segoe UI', Arial, sans-serif" font-style="italic" font-size="12.5" fill="white" opacity="0.70">Pre-deployment endpoint, network, and hardware readiness validation for Azure Local.</text>

  <!-- Bottom accent line -->
  <line x1="164" y1="144" x2="620" y2="144" stroke="#E74C3C" stroke-width="1.5" opacity="0.45"/>
</svg>
